name: "🗑️ Retirer / supprimer une station"
description: "Demander la suppression d'une station ou d'informations la concernant"
title: "[REMOVE] XX - CodePI"
labels: ["remove-station", "needs-review"]
body:
  - type: dropdown
    id: country
    attributes:
      label: "Pays *"
      options: [FR (France), BE (Belgique), CH (Suisse), LU (Luxembourg), ES (Espagne), IT (Italie), DE (Allemagne), Autre]
    validations: { required: true }
  - type: input
    id: pi_code
    attributes:
      label: "Code PI RDS *"
      placeholder: "FA41"
    validations: { required: true }
  - type: dropdown
    id: action
    attributes:
      label: "Action souhaitée *"
      options:
        - Supprimer toute la fiche
        - Supprimer uniquement le logo
        - Supprimer uniquement le site web
        - Supprimer uniquement les notes
        - Supprimer un champ spécifique (préciser ci-dessous)
    validations: { required: true }
  - type: textarea
    id: reason
    attributes:
      label: "Motif de la demande *"
    validations: { required: true }
  - type: dropdown
    id: requester_type
    attributes:
      label: "Vous êtes... *"
      options: [Un auditeur / contributeur signalant une erreur, Un représentant de la station concernée, Autre]
    validations: { required: true }
  - type: input
    id: contact
    attributes:
      label: "Contact (optionnel)"
      placeholder: "contact@..."
